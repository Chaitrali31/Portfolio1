<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    width: 1200px; 
    height: 630px; 
    background: linear-gradient(135deg, #1a1816 0%, #2a2520 50%, #1e1a17 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    position: relative;
    overflow: hidden;
  }
  .bg-pattern {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: 
      radial-gradient(circle at 20% 80%, rgba(200,82,42,0.15) 0%, transparent 50%),
      radial-gradient(circle at 80% 20%, rgba(232,168,124,0.1) 0%, transparent 50%);
  }
  .content {
    position: relative;
    z-index: 1;
    text-align: center;
    color: white;
    padding: 60px;
  }
  .name {
    font-size: 72px;
    font-weight: 900;
    margin-bottom: 16px;
    letter-spacing: -0.02em;
  }
  .name span { color: #e8a87c; font-style: italic; }
  .title {
    font-family: 'Inter', sans-serif;
    font-size: 28px;
    font-weight: 300;
    color: #b0a89e;
    margin-bottom: 32px;
  }
  .stats {
    display: flex;
    justify-content: center;
    gap: 48px;
    margin-top: 40px;
  }
  .stat {
    text-align: center;
  }
  .stat-number {
    font-family: 'Playfair Display', serif;
    font-size: 48px;
    font-weight: 900;
    color: white;
  }
  .stat-number span { color: #e8a87c; font-size: 24px; }
  .stat-label {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    color: #7a6e66;
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .location {
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    color: #7a6e66;
    margin-top: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .badge {
    display: inline-block;
    background: rgba(46,125,63,0.2);
    border: 1px solid rgba(46,125,63,0.4);
    color: #7dd87d;
    padding: 8px 20px;
    border-radius: 20px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    margin-top: 24px;
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="bg-pattern"></div>
  <div class="content">
    <div class="name">Chaitrali <span>Borade</span></div>
    <div class="title">Social Media Manager · 10+ Years · Berlin</div>
    <div class="stats">
      <div class="stat">
        <div class="stat-number">1.5M<span>+</span></div>
        <div class="stat-label">Community</div>
      </div>
      <div class="stat">
        <div class="stat-number">+28<span>%</span></div>
        <div class="stat-label">Engagement</div>
      </div>
      <div class="stat">
        <div class="stat-number">-35<span>%</span></div>
        <div class="stat-label">Production Time</div>
      </div>
    </div>
    <div class="badge">✦ Available Immediately · Full-time</div>
    <div class="location">📍 Berlin, Germany · Unrestricted Work Permit</div>
  </div>
</body>
</html>
